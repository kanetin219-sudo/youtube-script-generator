<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Script Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #eee;
      background: #f9f9f9;
    }

    .tab-button {
      flex: 1;
      padding: 15px 20px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      transition: all 0.3s;
      text-align: center;
    }

    .tab-button.active {
      color: #667eea;
      border-bottom: 3px solid #667eea;
      background: white;
    }

    .tab-button:hover {
      color: #667eea;
      background: white;
    }

    .tab-content {
      padding: 30px;
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .settings-panel {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .settings-panel h3 {
      margin-bottom: 15px;
      color: #333;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-size: 14px;
      font-weight: 500;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.3s;
    }

    .button:hover {
      opacity: 0.9;
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .card {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
      background: white;
    }

    .card h4 {
      margin-bottom: 10px;
      color: #333;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-box .number {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-box .label {
      font-size: 12px;
      opacity: 0.9;
    }

    .message {
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .loading {
      text-align: center;
      padding: 20px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .script-preview {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      margin: 15px 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .action-buttons button {
      flex: 1;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge.draft {
      background: #fff3cd;
      color: #856404;
    }

    .status-badge.ready {
      background: #d4edda;
      color: #155724;
    }

    .status-badge.used {
      background: #d1ecf1;
      color: #0c5460;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎬 YouTube Script Generator</h1>
      <p>YouTube インサイト + AI で効率的に台本を生成</p>
    </div>

    <div class="tabs">
      <button class="tab-button active" onclick="switchTab('dashboard')">📊 ダッシュボード</button>
      <button class="tab-button" onclick="switchTab('generate')">✍️ 台本生成</button>
      <button class="tab-button" onclick="switchTab('scripts')">📚 過去の台本</button>
      <button class="tab-button" onclick="switchTab('settings')">⚙️ 設定</button>
    </div>

    <!-- ダッシュボードタブ -->
    <div id="dashboard" class="tab-content active">
      <h2>📊 YouTube インサイト</h2>
      <div class="settings-panel">
        <h3>データ取得</h3>
        <div class="form-group">
          <label>チャンネルID</label>
          <input type="text" id="channelId" placeholder="例: UCr_GjBeap7-cUWGaG41mP6g">
        </div>
        <button class="button" onclick="fetchYouTubeData()">データを取得</button>
      </div>

      <div id="dashboardStats" class="stats"></div>

      <h3 style="margin-top: 30px;">最近の動画</h3>
      <div id="videosContainer"></div>
    </div>

    <!-- 台本生成タブ -->
    <div id="generate" class="tab-content">
      <h2>✍️ 新しい台本を生成</h2>
      <div class="settings-panel">
        <h3>生成設定</h3>
        <div class="form-group">
          <label>テーマ</label>
          <input type="text" id="scriptTheme" placeholder="例: 初心者向けYouTube戦略">
        </div>
        <div class="form-group">
          <label>参考にする動画タイプ</label>
          <input type="text" id="scriptType" placeholder="例: チュートリアル, レビュー, エッセイなど">
        </div>
        <div class="form-group">
          <label>台本の長さ（秒）</label>
          <input type="number" id="scriptLength" placeholder="300" min="60" max="3600">
        </div>
        <div class="form-group">
          <label>追加の指示</label>
          <textarea id="scriptInstructions" placeholder="台本に含めたい要素を入力"></textarea>
        </div>
        <button class="button" onclick="generateScript()">台本を生成</button>
      </div>

      <div id="generatedScriptContainer" style="display: none;">
        <h3>生成された台本</h3>
        <div class="message" id="scriptMessage"></div>
        <div class="script-preview" id="scriptPreview"></div>
        <div class="action-buttons">
          <button class="button" onclick="saveScript()">保存する</button>
          <button class="button" onclick="copyToClipboard()">コピー</button>
        </div>
      </div>
    </div>

    <!-- 過去の台本タブ -->
    <div id="scripts" class="tab-content">
      <h2>📚 保存済み台本</h2>
      <div class="form-group" style="margin-bottom: 20px;">
        <input type="text" id="searchScripts" placeholder="台本を検索..." onkeyup="filterScripts()">
      </div>
      <div id="scriptsContainer"></div>
    </div>

    <!-- 設定タブ -->
    <div id="settings" class="tab-content">
      <h2>⚙️ 設定</h2>
      <div class="settings-panel">
        <h3>API 設定</h3>
        <div class="form-group">
          <label>Claude API キー</label>
          <input type="password" id="claudeApiKey" placeholder="sk-ant-...">
        </div>
        <div class="form-group">
          <label>YouTube Analytics API キー（JSON）</label>
          <textarea id="youtubeApiKey" placeholder="Google Cloud JSON キーをペースト"></textarea>
        </div>
        <button class="button" onclick="saveSettings()">設定を保存</button>
      </div>

      <div class="settings-panel">
        <h3>Supabase 設定</h3>
        <p>Supabase URL: https://voutbjsdhsxjedddaqll.supabase.co</p>
        <p style="margin-top: 10px; color: #666; font-size: 13px;">
          ✓ テーブル: youtube_videos, youtube_insights, generated_scripts
        </p>
      </div>
    </div>
  </div>

  <script>
    // Supabase設定
    const SUPABASE_URL = 'https://voutbjsdhsxjedddaqll.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_91yCTbRgSKNd8fMoZnO2Ww_eQ8dEPPJ';

    let currentGeneratedScript = null;

    // タブ切り替え
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    // YouTube データ取得
    async function fetchYouTubeData() {
      const channelId = document.getElementById('channelId').value;
      if (!channelId) {
        alert('チャンネルIDを入力してください');
        return;
      }
      // TODO: YouTube Analytics API 連携
      console.log('YouTube data fetching:', channelId);
    }

    // 台本生成
    async function generateScript() {
      const claudeKey = localStorage.getItem('claudeApiKey');
      if (!claudeKey) {
        alert('設定でClaude APIキーを入力してください');
        return;
      }

      const theme = document.getElementById('scriptTheme').value;
      const type = document.getElementById('scriptType').value;
      const length = document.getElementById('scriptLength').value || 300;
      const instructions = document.getElementById('scriptInstructions').value;

      if (!theme) {
        alert('テーマを入力してください');
        return;
      }

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': claudeKey,
            'anthropic-version': '2023-06-01',
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 4000,
            system: `あなたは優秀なYouTube台本ライターです。視聴者を惹きつけ、完結しながらも深い内容の台本を作成します。`,
            messages: [{
              role: 'user',
              content: `以下の条件で YouTube 台本を生成してください：
テーマ: ${theme}
タイプ: ${type}
想定時間: ${length}秒
追加指示: ${instructions}

自然で魅力的な台本を書いてください。`
            }]
          })
        });

        const data = await response.json();
        if (data.error) {
          throw new Error(data.error.message);
        }

        currentGeneratedScript = {
          title: theme,
          content: data.content[0].text,
          theme: theme,
          type: type,
          generatedAt: new Date().toISOString()
        };

        document.getElementById('scriptPreview').textContent = currentGeneratedScript.content;
        document.getElementById('generatedScriptContainer').style.display = 'block';
        document.getElementById('scriptMessage').className = 'message success';
        document.getElementById('scriptMessage').textContent = '✓ 台本が生成されました！';
      } catch (error) {
        document.getElementById('scriptMessage').className = 'message error';
        document.getElementById('scriptMessage').textContent = 'エラー: ' + error.message;
      }
    }

    // 台本を保存
    async function saveScript() {
      if (!currentGeneratedScript) return;

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/generated_scripts`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
          },
          body: JSON.stringify({
            title: currentGeneratedScript.title,
            script_content: currentGeneratedScript.content,
            theme: currentGeneratedScript.theme,
            status: 'draft'
          })
        });

        if (response.ok) {
          alert('台本を保存しました！');
          currentGeneratedScript = null;
          document.getElementById('generatedScriptContainer').style.display = 'none';
        } else {
          throw new Error('保存に失敗しました');
        }
      } catch (error) {
        alert('エラー: ' + error.message);
      }
    }

    // クリップボードにコピー
    function copyToClipboard() {
      if (!currentGeneratedScript) return;
      navigator.clipboard.writeText(currentGeneratedScript.content);
      alert('クリップボードにコピーしました！');
    }

    // 台本をフィルタ
    function filterScripts() {
      const query = document.getElementById('searchScripts').value.toLowerCase();
      document.querySelectorAll('.card').forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(query) ? 'block' : 'none';
      });
    }

    // 設定を保存
    function saveSettings() {
      const claudeKey = document.getElementById('claudeApiKey').value;
      const youtubeKey = document.getElementById('youtubeApiKey').value;

      if (claudeKey) {
        localStorage.setItem('claudeApiKey', claudeKey);
      }
      if (youtubeKey) {
        localStorage.setItem('youtubeApiKey', youtubeKey);
      }

      alert('設定を保存しました！');
    }

    // 初期化
    window.addEventListener('load', () => {
      const savedClaudeKey = localStorage.getItem('claudeApiKey');
      if (savedClaudeKey) {
        document.getElementById('claudeApiKey').value = '***';
      }
    });
  </script>
</body>
</html>
